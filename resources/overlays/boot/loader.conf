hw.usb.quirk.25="0x048d 0x1336 0 0xffff UQ_MSC_NO_INQUIRY"
hw.usb.quirk.26="0x048d 0x1336 0 0xffff UQ_MSC_NO_RS_CLEAR_UA"
hw.usb.quirk.27="0x048d 0x1336 0 0xffff UQ_MSC_NO_TEST_UNIT_READY"
