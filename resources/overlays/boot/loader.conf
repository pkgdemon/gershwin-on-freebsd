hw.usb.quirk.35="0x0bda 0x0138 0 0xffff UQ_MSC_NO_INQUIRY"
hw.usb.quirk.36="0x0bda 0x0138 0 0xffff UQ_MSC_NO_RS_CLEAR_UA"
